<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jewett Lab Academic Family Tree</title>
<link rel="stylesheet" href="styles.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<header id="app-header">
  <div id="header-title">
    <h1>Academic Family Tree</h1>
    <span id="header-subtitle"></span>
  </div>
  <div id="toolbar">
    <div id="search-box">
      <input id="search-input" type="text" placeholder="Search by name..." autocomplete="off">
      <div id="search-results" class="hidden"></div>
    </div>
    <div id="orientation-group" class="btn-group">
      <button type="button" data-orientation="landscape" title="Generations flow left to right">Landscape</button>
      <button type="button" data-orientation="portrait" title="Generations flow top to bottom">Portrait</button>
      <button type="button" data-orientation="fan" title="Radial fan layout">Fan</button>
    </div>
    <button id="filter-toggle" class="toolbar-btn" type="button">Filters</button>
    <button id="expand-all" class="toolbar-btn" type="button">Expand All</button>
    <button id="reset-view" class="toolbar-btn" type="button">Show Full Tree</button>
    <button id="upload-btn" class="toolbar-btn" type="button">Upload JSON...</button>
    <input id="upload-input" type="file" accept=".json,application/json" hidden>
  </div>
</header>

<div id="filter-panel" class="hidden">
  <div id="filter-list"></div>
  <div id="filter-actions">
    <button id="filter-all" class="link-btn" type="button">Select all</button>
    <button id="filter-none" class="link-btn" type="button">Select none</button>
  </div>
</div>

<div id="breadcrumb" class="hidden"></div>

<main id="tree-container">
  <svg id="tree-svg"></svg>
  <div id="empty-state" class="hidden">No individuals match the current filters.</div>
  <div id="zoom-controls">
    <button id="zoom-in" type="button" title="Zoom in">+</button>
    <button id="zoom-out" type="button" title="Zoom out">&minus;</button>
    <button id="zoom-fit" type="button" title="Fit to screen">&#9678;</button>
  </div>
</main>

<aside id="detail-panel" class="hidden">
  <button id="detail-close" type="button" aria-label="Close">&times;</button>
  <div id="detail-content"></div>
</aside>

<script src="app.js"></script>
</body>
</html>
